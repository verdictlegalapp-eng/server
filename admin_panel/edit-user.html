<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User | Verdict Admin</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .edit-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            text-decoration: none;
            margin-bottom: 20px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #3b82f6;
        }
    </style>
</head>
<body style="background-color: #f8fafc; font-family: 'Inter', sans-serif;">
    <div class="edit-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h1 style="font-family: 'Outfit', sans-serif; color: #1e293b; margin-bottom: 30px;">Edit User Details</h1>
        
        <form id="edit-user-form">
            <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="user-name" placeholder="Enter name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="user-email" placeholder="Enter email" required>
                </div>
                <div class="form-group">
                    <label>User Role</label>
                    <select id="user-role">
                        <option value="user">Client</option>
                        <option value="lawyer">Attorney</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Account Status</label>
                    <select id="user-status">
                        <option value="active">Active</option>
                        <option value="suspended">Suspended</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="user-city" placeholder="City">
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" id="user-state" placeholder="State">
                </div>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-primary" style="padding: 12px 24px; font-weight: 600;">Save Changes</button>
                <button type="button" class="btn" style="padding: 12px 24px; background: #f1f5f9; color: #475569;" onclick="window.location.href='index.html'">Cancel</button>
            </div>
        </form>

        <div id="verification-section" style="margin-top: 40px; padding: 20px; background: #fff7ed; border-radius: 12px; border: 1px solid #ffedd5; display: none;">
            <h3 style="font-family: 'Outfit', sans-serif; color: #9a3412; margin-bottom: 10px; font-size: 18px;">Verification Management</h3>
            <p style="color: #c2410c; font-size: 14px; margin-bottom: 20px;">This user is currently a <strong>Verified Attorney</strong>. You can revoke their verification status below.</p>
            <button type="button" id="btn-revoke" class="btn" style="background: #ef4444; color: white; border: none; padding: 10px 20px; font-weight: 600; cursor: pointer; border-radius: 8px;">
                <i class="fas fa-shield-slash"></i> Revoke Verification
            </button>
        </div>

        <hr style="margin: 40px 0; border: 0; border-top: 1px solid #e2e8f0;">

        <div class="notif-section">
            <h2 style="font-family: 'Outfit', sans-serif; color: #1e293b; margin-bottom: 20px; font-size: 20px;">Send Direct Push Notification</h2>
            <form id="direct-notif-form">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="notif-title" placeholder="Message Title" required>
                </div>
                <div class="form-group">
                    <label>Message Body</label>
                    <textarea id="notif-body" placeholder="Enter message here..." style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; min-height: 80px;" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="background: #10b981; border-color: #10b981;">
                    <i class="fas fa-paper-plane"></i> Send Direct Message
                </button>
            </form>
        </div>
    </div>

    <script src="edit-user.js"></script>
</body>
</html>
